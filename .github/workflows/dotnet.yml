name: Build samples

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: samples-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: samples

      # Sibling layout expected by samples/Directory.Build.props (../Prism.SourceGenerators).
      - uses: actions/checkout@v4
        with:
          repository: MvvmAIO/Prism.SourceGenerators
          path: Prism.SourceGenerators

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore and build
        working-directory: samples
        run: dotnet build Prism.SourceGenerators.Samples.slnx -c Release --verbosity minimal
